<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapFrame - Framed Map Art Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #fff;
      --border: #e0dbd4;
      --text: #2c2c2c;
      --text-muted: #888;
      --accent: #3a3028;
      --accent-light: #6b5c4e;
      --radius: 8px;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--accent);
      color: #f0ebe3;
      padding: 20px 32px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.12em;
    }

    header span {
      font-family: sans-serif;
      font-size: 0.78rem;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 66px);
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-family: sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }

    input, select {
      font-family: sans-serif;
      font-size: 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-light);
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .style-btn {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      transition: border-color 0.2s, background 0.2s;
      font-family: sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .style-btn:hover { border-color: var(--accent-light); }
    .style-btn.active { border-color: var(--accent); background: var(--accent); color: #f0ebe3; }

    .style-preview {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .preview-minimal {
      background: #f8f5f0;
      border: 1px solid #ddd;
    }
    .preview-minimal::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 20%;
      right: 20%;
      height: 1.5px;
      background: #bbb;
    }
    .preview-minimal::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      bottom: 20%;
      width: 1.5px;
      background: #bbb;
    }

    .preview-dark {
      background: #0d0d0d;
    }
    .preview-dark::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 20%;
      right: 20%;
      height: 1.5px;
      background: #555;
    }
    .preview-dark::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      bottom: 20%;
      width: 1.5px;
      background: #555;
    }

    .preview-sepia {
      background: #f4ead8;
      border: 1px solid #d0b898;
    }
    .preview-sepia::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 20%;
      right: 20%;
      height: 1.5px;
      background: #9a7c5a;
    }
    .preview-sepia::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      bottom: 20%;
      width: 1.5px;
      background: #9a7c5a;
    }

    .render-btn {
      background: var(--accent);
      color: #f0ebe3;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 600;
    }

    .render-btn:hover { background: var(--accent-light); }
    .render-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .download-btn {
      background: none;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px;
      font-family: sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      display: none;
    }

    .download-btn:hover { background: var(--accent); color: #f0ebe3; }

    .canvas-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #e8e4de;
      position: relative;
    }

    .map-display {
      max-width: 100%;
      max-height: calc(100vh - 150px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15);
      display: none;
    }

    .placeholder {
      text-align: center;
      color: var(--text-muted);
      font-family: sans-serif;
    }

    .placeholder-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .placeholder h2 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      opacity: 0.6;
    }

    .placeholder p {
      font-size: 0.8rem;
      opacity: 0.4;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: var(--text-muted);
      font-family: sans-serif;
      font-size: 0.85rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #c0392b;
      font-family: sans-serif;
      font-size: 0.82rem;
      background: #fdecea;
      border: 1px solid #f0c0ba;
      border-radius: var(--radius);
      padding: 10px 12px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .coords-toggle {
      font-family: sans-serif;
      font-size: 0.72rem;
      color: var(--accent-light);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
    }

    .coords-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      display: none;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .canvas-area { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <h1>MapFrame</h1>
  <span>Framed Map Art Generator</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="form-group">
      <label>Location</label>
      <input type="text" id="location" placeholder="Chicago, IL" value="Chicago, IL" autocomplete="off">
      <button class="coords-toggle" onclick="toggleCoords()">Use coordinates instead</button>
      <div class="coords-row" id="coords-row">
        <input type="number" id="lat" placeholder="Lat (41.85)" step="0.0001">
        <input type="number" id="lon" placeholder="Lon (-87.65)" step="0.0001">
      </div>
    </div>

    <div class="form-group">
      <label>Radius</label>
      <select id="radius">
        <option value="0.8">Tight (0.8 km)</option>
        <option value="1.5" selected>Standard (1.5 km)</option>
        <option value="2.5">Wide (2.5 km)</option>
        <option value="4">Broad (4 km)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Style</label>
      <div class="style-grid">
        <button class="style-btn active" data-style="minimal" onclick="selectStyle('minimal', this)">
          <div class="style-preview preview-minimal"></div>
          Minimal
        </button>
        <button class="style-btn" data-style="dark" onclick="selectStyle('dark', this)">
          <div class="style-preview preview-dark"></div>
          Dark
        </button>
        <button class="style-btn" data-style="sepia" onclick="selectStyle('sepia', this)">
          <div class="style-preview preview-sepia"></div>
          Sepia
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>Label (optional)</label>
      <input type="text" id="map-label" placeholder="City name" autocomplete="off">
      <input type="text" id="map-sublabel" placeholder="Subtitle or coordinates" autocomplete="off" style="margin-top:6px">
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="render-btn" onclick="renderMap()" id="render-btn">Generate Map</button>
    <button class="download-btn" onclick="downloadSVG()" id="download-btn">Download SVG</button>
    <button class="download-btn" onclick="downloadPNG()" id="download-png" style="display:none">Download PNG (1200px)</button>
  </div>

  <div class="canvas-area" id="canvas-area">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">🗺</div>
      <h2>Enter a location and generate</h2>
      <p>Styled map art, ready to frame and print</p>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Fetching map data...</span>
    </div>
    <img id="map-display" class="map-display" alt="Generated map">
  </div>
</div>

<script>
let currentSVG = null;
let selectedStyle = 'minimal';
let showCoords = false;

function selectStyle(style, btn) {
  selectedStyle = style;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleCoords() {
  showCoords = !showCoords;
  const row = document.getElementById('coords-row');
  row.style.display = showCoords ? 'grid' : 'none';
  document.querySelector('.coords-toggle').textContent = showCoords ? 'Use city name instead' : 'Use coordinates instead';
}

async function renderMap() {
  const locationInput = document.getElementById('location').value.trim();
  const latInput = document.getElementById('lat').value.trim();
  const lonInput = document.getElementById('lon').value.trim();
  const radius = document.getElementById('radius').value;
  const labelLine1 = document.getElementById('map-label').value.trim();
  const labelLine2 = document.getElementById('map-sublabel').value.trim();
  const label = [labelLine1, labelLine2].filter(Boolean).join('\n');

  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!locationInput && (!latInput || !lonInput)) {
    errEl.textContent = 'Please enter a location or coordinates.';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('render-btn').disabled = true;
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('map-display').style.display = 'none';
  document.getElementById('download-btn').style.display = 'none';
  document.getElementById('download-png').style.display = 'none';

  const body = { style: selectedStyle, radius, label };

  if (showCoords && latInput && lonInput) {
    body.lat = latInput;
    body.lon = lonInput;
  } else {
    body.query = locationInput;
  }

  try {
    const res = await fetch('/api/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    currentSVG = data.svg;

    // Display as data URL
    const blob = new Blob([data.svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = document.getElementById('map-display');
    img.src = url;
    img.style.display = 'block';
    document.getElementById('download-btn').style.display = 'block';
    document.getElementById('download-png').style.display = 'block';

    // Prefill label if empty
    if (!labelLine1 && data.displayName) {
      const parts = data.displayName.split(',');
      document.getElementById('map-label').value = parts[0].trim();
      if (parts[1]) document.getElementById('map-sublabel').value = parts[1].trim();
    }
  } catch (err) {
    errEl.textContent = 'Error: ' + err.message;
    errEl.style.display = 'block';
    document.getElementById('placeholder').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('render-btn').disabled = false;
  }
}

function downloadSVG() {
  if (!currentSVG) return;
  const blob = new Blob([currentSVG], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const loc = document.getElementById('location').value.replace(/\s+/g, '-').toLowerCase() || 'mapframe';
  a.download = `mapframe-${loc}-${selectedStyle}.svg`;
  a.click();
}

function downloadPNG() {
  if (!currentSVG) return;
  const img = new Image();
  const blob = new Blob([currentSVG], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = 1200;
    canvas.height = 1200;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 1200, 1200);
    canvas.toBlob(function(pngBlob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      const loc = document.getElementById('location').value.replace(/\s+/g, '-').toLowerCase() || 'mapframe';
      a.download = `mapframe-${loc}-${selectedStyle}.png`;
      a.click();
    }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// Enter key support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('location').addEventListener('keydown', e => {
    if (e.key === 'Enter') renderMap();
  });
});
</script>

</body>
</html>
